{% extends 'base.html' %}
{% block title %}Register — EduLearn{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block body %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
          <a href="{{ url_for('index') }}" class="text-decoration-none">
            <span class="fs-2 fw-700 text-primary"><i class="bi bi-mortarboard-fill me-2"></i>EduLearn</span>
          </a>
          <p class="text-muted mt-1">Create your free account and start learning today.</p>
        </div>
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-4">
            <h5 class="fw-700 mb-4">Create Account</h5>
            <form method="POST" action="{{ url_for('register') }}">
              <div class="mb-3">
                <label class="form-label fw-500 small">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-500 small">Username</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted">@</span>
                  <input type="text" name="username" class="form-control border-start-0 ps-0"
                         placeholder="yourname" required pattern="[a-zA-Z0-9_]+" title="Letters, numbers, underscore only"/>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-500 small">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@email.com" required/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-500 small">Password</label>
                <div class="input-group">
                  <input type="password" name="password" id="passField" class="form-control border-end-0"
                         placeholder="Min 6 characters" required minlength="6"/>
                  <span class="input-group-text bg-light cursor-pointer" onclick="togglePassword('passField',this)">
                    <i class="bi bi-eye text-muted"></i>
                  </span>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-500 small">Confirm Password</label>
                <input type="password" name="confirm" class="form-control" placeholder="Repeat password" required minlength="6"/>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-600">Create Account</button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0">
              Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-600">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
