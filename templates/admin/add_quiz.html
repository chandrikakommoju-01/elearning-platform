{% extends 'admin/base_admin.html' %}
{% block title %}Add Quiz — EduLearn{% endblock %}
{% block page_title %}Add Quiz to: {{ course.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('add_quiz', course_id=course.id) }}" id="quizForm">

          <!-- Quiz Info -->
          <h6 class="fw-700 mb-3 pb-2 border-bottom">Quiz Information</h6>
          <div class="row g-3 mb-4">
            <div class="col-md-7">
              <label class="form-label fw-500">Quiz Title *</label>
              <input type="text" name="title" class="form-control"
                     placeholder="e.g. Python Basics Quiz" required/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-500">Pass Score (%)</label>
              <input type="number" name="pass_score" class="form-control"
                     value="70" min="1" max="100" required/>
            </div>
            <div class="col-12">
              <label class="form-label fw-500">Description</label>
              <textarea name="description" class="form-control" rows="2"
                        placeholder="Brief description of this quiz..."></textarea>
            </div>
          </div>

          <!-- Questions Builder -->
          <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
            <h6 class="fw-700 mb-0">Questions</h6>
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="addQuestion()">
              <i class="bi bi-plus me-1"></i>Add Question
            </button>
          </div>

          <div id="questions-container"></div>

          <div class="mt-4 d-flex gap-3">
            <button type="submit" class="btn btn-primary px-5 fw-600" id="submitBtn" disabled>
              Create Quiz
            </button>
            <a href="{{ url_for('admin_course_detail', course_id=course.id) }}"
               class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let questionCount = 0;

function addQuestion() {
  questionCount++;
  const qNum = questionCount;
  const container = document.getElementById('questions-container');

  const html = `
    <div class="card border rounded-3 mb-3" id="q-block-${qNum}">
      <div class="card-header bg-light d-flex justify-content-between align-items-center py-2 px-3">
        <span class="fw-600 small">Question ${qNum}</span>
        <button type="button" class="btn btn-sm btn-outline-danger py-0 px-2"
                onclick="removeQuestion(${qNum})">
          <i class="bi bi-trash"></i>
        </button>
      </div>
      <div class="card-body p-3">
        <div class="mb-3">
          <label class="form-label fw-500 small">Question Text *</label>
          <input type="text" name="q_${qNum}" class="form-control"
                 placeholder="Enter your question here..." required/>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label class="form-label small text-muted">Option A</label>
            <input type="text" name="a_${qNum}" class="form-control form-control-sm"
                   placeholder="Option A" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label small text-muted">Option B</label>
            <input type="text" name="b_${qNum}" class="form-control form-control-sm"
                   placeholder="Option B" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label small text-muted">Option C</label>
            <input type="text" name="c_${qNum}" class="form-control form-control-sm"
                   placeholder="Option C" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label small text-muted">Option D</label>
            <input type="text" name="d_${qNum}" class="form-control form-control-sm"
                   placeholder="Option D" required/>
          </div>
        </div>
        <div>
          <label class="form-label fw-500 small">Correct Answer *</label>
          <div class="d-flex gap-3">
            ${['a','b','c','d'].map(opt => `
              <div class="form-check">
                <input class="form-check-input" type="radio"
                       name="correct_${qNum}" id="correct_${qNum}_${opt}"
                       value="${opt}" required/>
                <label class="form-check-label" for="correct_${qNum}_${opt}">
                  ${opt.toUpperCase()}
                </label>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;

  container.insertAdjacentHTML('beforeend', html);
  document.getElementById('submitBtn').disabled = false;
  updateQuestionNumbers();
}

function removeQuestion(qNum) {
  const block = document.getElementById(`q-block-${qNum}`);
  if (block) block.remove();
  if (document.getElementById('questions-container').children.length === 0) {
    document.getElementById('submitBtn').disabled = true;
  }
}

function updateQuestionNumbers() {
  // no-op (questions retain original numbers even after deletion — IDs stay unique)
}

// Add first question automatically
addQuestion();
</script>
{% endblock %}
