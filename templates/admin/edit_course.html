{% extends 'admin/base_admin.html' %}
{% block title %}Edit Course — EduLearn{% endblock %}
{% block page_title %}Edit: {{ course.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('edit_course', course_id=course.id) }}" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-500">Course Title *</label>
              <input type="text" name="title" class="form-control" value="{{ course.title }}" required/>
            </div>
            <div class="col-12">
              <label class="form-label fw-500">Description *</label>
              <textarea name="description" class="form-control" rows="4" required>{{ course.description }}</textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-500">Instructor Name *</label>
              <input type="text" name="instructor" class="form-control" value="{{ course.instructor }}" required/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-500">Category</label>
              <select name="category" class="form-select">
                {% for cat in ['Programming','Design','Business','Marketing','Data Science','Photography','Music','Other'] %}
                <option value="{{ cat }}" {% if course.category==cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-500">Level</label>
              <select name="level" class="form-select">
                {% for lv in ['Beginner','Intermediate','Advanced'] %}
                <option value="{{ lv }}" {% if course.level==lv %}selected{% endif %}>{{ lv }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-500">Course Thumbnail</label>
              <input type="file" name="thumbnail" class="form-control" accept="image/*"/>
              <small class="text-muted">Leave empty to keep current thumbnail</small>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="is_active"
                       id="isActive" {% if course.is_active %}checked{% endif %}/>
                <label class="form-check-label fw-500" for="isActive">Course is Active (visible to students)</label>
              </div>
            </div>
            <div class="col-12 mt-2 d-flex gap-3">
              <button type="submit" class="btn btn-primary px-5 fw-600">Save Changes</button>
              <a href="{{ url_for('admin_course_detail', course_id=course.id) }}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
