{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block body %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="text-center p-5">
    <div class="display-1 fw-700 text-warning">500</div>
    <h2 class="fw-700 mb-2">Internal Server Error</h2>
    <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary px-5">Go Home</a>
  </div>
</div>
{% endblock %}
