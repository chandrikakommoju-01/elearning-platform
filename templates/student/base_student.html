{% extends 'base.html' %}
{% block body %}
<div class="d-flex" id="wrapper">

  <!-- ── SIDEBAR ── -->
  <nav id="sidebar" class="sidebar bg-primary-dark d-flex flex-column">
    <div class="sidebar-header px-4 py-3 border-bottom border-white-10">
      <a href="{{ url_for('index') }}" class="text-decoration-none">
        <span class="fw-700 fs-5 text-white"><i class="bi bi-mortarboard-fill me-2 text-accent"></i>EduLearn</span>
      </a>
    </div>

    <!-- User Info -->
    <div class="px-4 py-3 border-bottom border-white-10">
      <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='uploads/avatars/' + (current_user.avatar or 'default.png')) }}"
             onerror="this.src='https://ui-avatars.com/api/?name={{ current_user.full_name or current_user.username }}&background=4F46E5&color=fff&size=40'"
             class="rounded-circle" width="40" height="40" style="object-fit:cover;" alt="avatar"/>
        <div class="overflow-hidden">
          <div class="text-white fw-600 text-truncate small">{{ current_user.full_name or current_user.username }}</div>
          <div class="text-white-50" style="font-size:.7rem;">Student</div>
        </div>
      </div>
    </div>

    <!-- Nav Links -->
    <ul class="nav flex-column px-3 py-2 flex-grow-1">
      <li class="nav-item">
        <a href="{{ url_for('student_dashboard') }}"
           class="nav-link sidebar-link {% if request.endpoint=='student_dashboard' %}active{% endif %}">
          <i class="bi bi-grid-fill me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('student_courses') }}"
           class="nav-link sidebar-link {% if request.endpoint=='student_courses' %}active{% endif %}">
          <i class="bi bi-journal-bookmark-fill me-2"></i>All Courses
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('student_profile') }}"
           class="nav-link sidebar-link {% if request.endpoint=='student_profile' %}active{% endif %}">
          <i class="bi bi-person-circle me-2"></i>My Profile
        </a>
      </li>
    </ul>

    <div class="px-3 py-3 border-top border-white-10">
      <a href="{{ url_for('logout') }}" class="nav-link sidebar-link text-danger">
        <i class="bi bi-box-arrow-left me-2"></i>Logout
      </a>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <div id="page-content" class="flex-grow-1 overflow-auto">
    <!-- Top Bar -->
    <header class="topbar bg-white border-bottom px-4 py-2 d-flex align-items-center sticky-top">
      <button class="btn btn-sm btn-outline-secondary me-3 d-lg-none" id="sidebarToggle">
        <i class="bi bi-list"></i>
      </button>
      <h6 class="mb-0 fw-600 text-dark">{% block page_title %}{% endblock %}</h6>
      <div class="ms-auto d-flex align-items-center gap-2">
        <a href="{{ url_for('student_courses') }}" class="btn btn-primary btn-sm px-3">
          <i class="bi bi-plus me-1"></i>Explore Courses
        </a>
      </div>
    </header>

    <!-- Page Body -->
    <main class="p-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
